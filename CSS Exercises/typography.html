<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Typography Exercise</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="typography.css">
</head>
<body>

    <header>
        <h1>Local Community Event Portal</h1>
    </header>

    <section class="event">
        <h2>Community Clean-Up Day</h2>
        <p class="description">
            Join volunteers across the city to help keep our parks,
            streets, and public spaces clean and beautiful for everyone.
        </p>
    </section>

    <section class="event">
        <h2>Food Festival</h2>
        <p class="description">
            Enjoy delicious local cuisine, live music, and exciting
            activities for the whole family.
        </p>
    </section>

</body>
</html>
