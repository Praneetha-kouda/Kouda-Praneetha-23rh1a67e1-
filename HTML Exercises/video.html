<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Video Invite with Media Events</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      text-align: center;
      padding: 30px;
    }

    .container {
      background: white;
      padding: 20px;
      border-radius: 10px;
      width: 70%;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
    }

    video {
      width: 100%;
      max-width: 600px;
      border-radius: 10px;
    }

    #message {
      margin-top: 15px;
      font-size: 18px;
      color: green;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="container">
    <h1>Event Promo Video</h1>

    <!-- Video Element -->
    <video id="promoVideo" controls oncanplay="videoReady()">
      <source src="promo.mp4" type="video/mp4">
      Your browser does not support the video tag.
    </video>

    <!-- Message Display -->
    <p id="message"></p>
  </div>

  <script>
    // Display message when video can play
    function videoReady() {
      document.getElementById("message").innerHTML =
        "✅ Video ready to play!";
    }

    // Warn user before leaving page
    window.onbeforeunload = function () {
      return "Are you sure you want to leave this page?";
    };
  </script>

</body>
</html>
