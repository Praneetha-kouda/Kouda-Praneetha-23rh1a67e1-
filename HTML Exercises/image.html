<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gallery</title>
    <style>
        .gallery-img { border: 3px solid #333; width: 200px; height: auto; }
        .caption { font-weight: bold; margin-top: 5px; }
        td { padding: 10px; text-align: center; }
    </style>
</head>
<body>

    <table>
        <tr>
            <td>
                <img src="event1.jpg" alt="Marathon" title="Annual Marathon" class="gallery-img">
                <div class="caption">Charity Marathon</div>
            </td>
            <td>
                <img src="event2.jpg" alt="Food Fest" title="Food Festival" class="gallery-img">
                <div class="caption">Food Festival</div>
            </td>
            <td>
                <img src="event3.jpg" alt="Green Drive" title="Plantation" class="gallery-img">
                <div class="caption">Plantation Drive</div>
            </td>
        </tr>
        <tr>
            <td>
                <img src="event4.jpg" alt="Art Competition" title="Art Fest" class="gallery-img">
                <div class="caption">Art Contest</div>
            </td>
            <td>
                <img src="event5.jpg" alt="Workshop" title="Tech Workshop" class="gallery-img">
                <div class="caption">Tech Workshop</div>
            </td>
            <td>
                <img src="event6.jpg" alt="Concert" title="Music Night" class="gallery-img">
                <div class="caption">Music Concert</div>
            </td>
        </tr>
    </table>

</body>
</html>
