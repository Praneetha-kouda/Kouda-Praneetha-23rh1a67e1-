<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geolocation for Event Mapping</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 50px;
            background-color: #f4f4f9;
        }
        .container {
            max-width: 400px;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            text-align: center;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #007bff;
            color: white;
            border: none;
            border-radius: 4px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.2s;
            font-weight: bold;
        }
        button:hover {
            background-color: #0056b3;
        }
        .result-box {
            margin-top: 20px;
            padding: 15px;
            border-radius: 4px;
            font-size: 15px;
            display: none;
            word-wrap: break-word;
        }
        .success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        .error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Event Mapping</h2>
    <button id="findEventsBtn">Find Nearby Events</button>
    <div id="result" class="result-box"></div>
</div>

<script>
    const findEventsBtn = document.getElementById('findEventsBtn');
    const resultBox = document.getElementById('result');

    function showSuccess(position) {
        const latitude = position.coords.latitude;
        const longitude = position.coords.longitude;
        const accuracy = position.coords.accuracy;

        resultBox.className = "result-box success";
        resultBox.innerHTML = `<strong>Location Found!</strong><br>Latitude: ${latitude}<br>Longitude: ${longitude}<br><small>Accuracy: within ${Math.round(accuracy)} meters</small>`;
        resultBox.style.display = "block";
    }

    function showError(error) {
        resultBox.className = "result-box error";
        let message = "";

        switch(error.code) {
            case error.PERMISSION_DENIED:
                message = "Error: Permission denied. Please allow location access to find nearby events.";
                break;
            case error.TIMEOUT:
                message = "Error: The request to get user location timed out.";
                break;
            case error.POSITION_UNAVAILABLE:
                message = "Error: Location information is unavailable.";
                break;
            default:
                message = "An unknown error occurred while retrieving location.";
                break;
        }

        resultBox.textContent = message;
        resultBox.style.display = "block";
    }

    findEventsBtn.addEventListener('click', () => {
        if (!navigator.geolocation) {
            resultBox.className = "result-box error";
            resultBox.textContent = "Geolocation is not supported by your browser.";
            resultBox.style.display = "block";
            return;
        }

        resultBox.className = "result-box";
        resultBox.style.display = "block";
        resultBox.textContent = "Locating...";

        const options = {
            enableHighAccuracy: true,
            timeout: 10000,
            maximumAge: 0
        };

        navigator.geolocation.getCurrentPosition(showSuccess, showError, options);
    });
</script>

</body>
</html>
