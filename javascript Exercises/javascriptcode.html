<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local Community Event Portal</title>
    <link rel="stylesheet" href="javascript.css">
    <script src="javascript.js"></script>
</head>
<body>

    <header>
        <h1>Community Event Portal</h1>
        <p>Discover, filter, and register for local upcoming events dynamically</p>
    </header>

    <div class="portal-container">
        
        <section class="controls-panel">
            <div class="filter-group">
                <label for="searchBar">Quick Search:</label>
                <input type="text" id="searchBar" placeholder="Type event name...">
            </div>

            <div class="filter-group">
                <label for="categoryFilter">Filter by Category:</label>
                <select id="categoryFilter">
                    <option value="all">All Categories</option>
                    <option value="Music">Music</option>
                    <option value="Technology">Technology</option>
                    <option value="Food & Drink">Food & Drink</option>
                </select>
            </div>
        </section>

        <section class="events-display-section">
            <div id="loadingSpinner" class="spinner" style="display: none;"></div>
            <div id="eventsGrid" class="events-grid"></div>
        </section>

        <section class="registration-panel">
            <h2>Event Registration</h2>
            <form id="registrationForm" novalidate>
                <div class="form-group">
                    <label for="regEventId">Selected Event ID:</label>
                    <input type="text" id="regEventId" name="eventId" readonly placeholder="Click 'Register' on an event card">
                    <span class="error-msg" id="errorEventId"></span>
                </div>
                <div class="form-group">
                    <label for="fullName">Full Name:</label>
                    <input type="text" id="fullName" name="fullName" placeholder="John Doe">
                    <span class="error-msg" id="errorFullName"></span>
                </div>
                <div class="form-group">
                    <label for="email">Email Address:</label>
                    <input type="email" id="email" name="email" placeholder="john@example.com">
                    <span class="error-msg" id="errorEmail"></span>
                </div>
                <button type="submit" id="registerBtn">Submit Registration</button>
            </form>
            <div id="submissionStatus" class="status-box"></div>
        </section>
    </div>

    <script src="main.js"></script>
</body>
</html>
